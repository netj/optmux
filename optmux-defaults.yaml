optmux:
  shortcuts:
    C-M-s: ""                          # empty split (new shell pane, zoomed)
    C-M-c:
      command: wtcode
      new_window: true
    C-M-f:
      command: ${VISUAL:-${EDITOR:-vim}} $(fzf || echo .)
    C-M-g: lazygit
    C-M-h:
      command: bash "$OPTMUX_DIR/tmux/tips.sh" --force
      new_window: true
