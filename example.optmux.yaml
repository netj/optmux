#!/usr/bin/env -S uvx optmux
session_name: example
start_directory: .

optmux:
  shortcuts:
    C-M-d: make deploy
    C-M-b: make build
  tmux_config:
    project-settings: |
      set -g status-style bg=blue
      set -g pane-border-style fg=blue

windows:
  - window_name: editor
    panes:
      - vim .
  - window_name: shell
    panes:
      - ""
  - window_name: logs
    panes:
      - tail -f /var/log/system.log
